services:
  app:
    build:
      context: .
      target: dev
    container_name: ticket_management_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv
    networks:
      - backend

networks:
  backend:
    driver: bridge
